# Dagger workspace configuration
# Install modules with: dagger mod install <module>
# Example:
#   dagger mod install github.com/dagger/dagger/modules/wolfi

[modules.dagger-go-sdk]
source = "github.com/dagger/go-sdk"

# Marker filename that skips generate when found at or above a Go SDK module root.
# settings.skipGenerateFilename = ""

[modules.my-module]
source = ".dagger/modules/my-module"

[modules.my-mod]
source = ".dagger/modules/my-mod"

[modules.my-dep]
source = ".dagger/modules/my-dep"

[modules.dagger-go-sdk.as-sdk]
name = "go"

[[modules.dagger-go-sdk.as-sdk.modules]]
path = ".dagger/modules/my-module"

[[modules.dagger-go-sdk.as-sdk.modules]]
path = ".dagger/modules/my-mod"

[[modules.dagger-go-sdk.as-sdk.modules]]
path = ".dagger/modules/my-dep"
